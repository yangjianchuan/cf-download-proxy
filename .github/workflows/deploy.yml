name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - '_worker.js'
      - 'index.html'
      - '404.html'
      - 'logo.svg'
      - 'favicon.ico'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Check Wrangler version
        run: wrangler --version

      - name: Validate required secret
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is not set. Please add it in GitHub Actions secrets." >&2
            exit 1
          fi

      - name: Validate Cloudflare authentication
        run: wrangler whoami

      - name: Validate Wrangler configuration
        run: wrangler deploy --dry-run --minify

      - name: Deploy Worker
        run: wrangler deploy --minify
