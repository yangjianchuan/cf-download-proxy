<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        .card {
            width: min(92vw, 36rem);
            padding: 2.5rem;
            border-radius: 1rem;
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .code {
            margin: 0;
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #38bdf8;
        }

        h1 {
            margin: 0.75rem 0 0;
            font-size: 1.8rem;
        }

        p {
            margin: 1rem 0 0;
            line-height: 1.7;
            color: #cbd5e1;
        }

        a {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.85rem 1.2rem;
            border-radius: 0.75rem;
            color: #0f172a;
            background: #38bdf8;
            text-decoration: none;
            font-weight: 700;
        }

        a:hover {
            background: #7dd3fc;
        }
    </style>
</head>

<body>
    <main class="card">
        <p class="code">404</p>
        <h1>页面不存在</h1>
        <p>你访问的资源不存在，或者链接已失效。请检查地址是否正确。</p>
        <a href="/">返回首页</a>
    </main>
</body>

</html>
