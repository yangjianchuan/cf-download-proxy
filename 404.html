<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#eef7ff">
    <meta name="description" content="页面不存在，可返回首页继续使用。">
    <meta name="robots" content="noindex,follow">
    <title>页面不存在 | 下载加速</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <style>
        :root {
            --bg: #eef7ff;
            --card: rgba(255, 255, 255, 0.92);
            --text: #0c1b30;
            --accent: #38b6ff;
            --accent-deep: #1394e0;
            --shadow: 0 18px 40px rgba(18, 51, 99, 0.1);
            --radius-xl: 26px;
            --radius-pill: 999px;
            font-size: clamp(15px, 0.96rem + 0.08vw, 18px);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(56, 182, 255, 0.14), transparent 24rem),
                linear-gradient(180deg, #f9fcff 0%, var(--bg) 100%);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            width: min(100%, 560px);
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            text-align: center;
        }

        .logo-wrap {
            width: 4.2rem;
            height: 4.2rem;
            margin: 0 auto 1rem;
            border-radius: 1.2rem;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.72));
            box-shadow: 0 12px 28px rgba(16, 45, 86, 0.12);
        }

        .logo {
            width: 72%;
            height: 72%;
            object-fit: contain;
            display: block;
        }

        .title {
            margin: 0;
            font-size: clamp(2rem, 6vw, 2.9rem);
            line-height: 1.08;
            letter-spacing: -0.04em;
        }

        .actions {
            display: flex;
            gap: 0.7rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .button {
            min-width: 6.2rem;
            min-height: 2.8rem;
            border-radius: var(--radius-pill);
            border: 1px solid transparent;
            padding: 0.72rem 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .button.primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: #fff;
        }

        @media (max-width: 520px) {
            .card {
                padding: 1.2rem;
            }

            .actions {
                display: grid;
                grid-template-columns: 1fr;
            }

            .button {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="logo-wrap">
                <img class="logo" src="/logo.svg" alt="下载加速">
            </div>
            <h1 class="title">页面不存在</h1>

            <div class="actions">
                <a class="button primary" href="/">返回首页</a>
            </div>
        </section>
    </main>
</body>

</html>
